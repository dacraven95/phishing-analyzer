services:
  phish-analyzer-api:
    image: phish-analyzer-api:latest
    container_name: phish-analyzer-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
     - API_KEY=your-secret-key-here
     - THREAT_INTEL_ENABLED=false # Set to true in your own private instance
    volumes:
     - ./phish_analyzer/config:/app/phish_analyzer/config
